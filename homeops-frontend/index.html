<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <title>Vite App</title>
  <script>
    if (localStorage.theme === 'dark') {
      document.querySelector('html').classList.add('dark');
      document.querySelector('html').style.colorScheme = 'dark';
      document.querySelector('html').style.backgroundColor = '#ffffff';
    } else {
      document.querySelector('html').classList.remove('dark');
      document.querySelector('html').style.colorScheme = 'light';
      document.querySelector('html').style.backgroundColor = '#ffffff';
    }
  </script>
  <style>
    #oauth-callback-placeholder {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.875rem;
      background: #f9fafb;
      z-index: 9999;
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    #oauth-callback-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #6E8276;
      border-top-color: transparent;
      border-radius: 9999px;
      animation: oauth-spin 0.8s linear infinite;
    }

    #oauth-callback-placeholder p {
      margin: 0;
      color: #6b7280;
      font-size: 0.95rem;
    }

    @keyframes oauth-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="font-inter antialiased bg-white text-gray-600 dark:text-gray-400">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <script>
    if (localStorage.getItem('sidebar-expanded') == 'true') {
      document.querySelector('body').classList.add('sidebar-expanded');
    } else {
      document.querySelector('body').classList.remove('sidebar-expanded');
    }
  </script>
  <div id="oauth-callback-placeholder" aria-live="polite">
    <div id="oauth-callback-spinner" aria-hidden="true"></div>
    <p>Completing sign in...</p>
  </div>
  <div id="root"></div>
  <script>
    (function () {
      var isAuthCallback = window.location.pathname === '/auth/callback';
      if (!isAuthCallback) return;

      var placeholder = document.getElementById('oauth-callback-placeholder');
      var root = document.getElementById('root');
      if (!placeholder || !root) return;

      placeholder.style.display = 'flex';

      var hidePlaceholder = function () {
        placeholder.style.display = 'none';
      };

      if (root.childElementCount > 0) {
        hidePlaceholder();
        return;
      }

      var observer = new MutationObserver(function () {
        if (root.childElementCount > 0) {
          hidePlaceholder();
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });

      window.addEventListener('load', function () {
        if (root.childElementCount > 0) {
          hidePlaceholder();
          observer.disconnect();
        }
      });
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
