<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <title>Vite App</title>
  <script>
    if (localStorage.theme === 'dark' || !('theme' in localStorage)) {
      document.querySelector('html').classList.add('dark');
      document.querySelector('html').style.colorScheme = 'dark';
    } else {
      document.querySelector('html').classList.remove('dark');
      document.querySelector('html').style.colorScheme = 'light';
    }
  </script>
</head>

<body class="font-inter antialiased bg-[var(--color-gray-50)] dark:bg-gray-900 text-gray-600 dark:text-gray-400">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <!-- Shown immediately during OAuth callback before React hydrates -->
  <div id="oauth-callback-placeholder" style="display:none;min-height:100dvh;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:system-ui,sans-serif" class="flex">
    <div style="width:40px;height:40px;border:3px solid #7c3aed;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <p style="color:#6b7280;font-size:0.95rem">Completing sign in…</p>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>
    if (window.location.pathname === '/auth/callback') {
      var p = document.getElementById('oauth-callback-placeholder');
      if (p) { p.style.display = 'flex'; p.style.position = 'fixed'; p.style.inset = '0'; p.style.zIndex = '9999'; p.style.background = 'var(--color-gray-50, #f9fafb)'; }
    }
  </script>
  <script>
    if (localStorage.getItem('sidebar-expanded') == 'true') {
      document.querySelector('body').classList.add('sidebar-expanded');
    } else {
      document.querySelector('body').classList.remove('sidebar-expanded');
    }
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
